global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'notify-gateway'
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: '/api/actuator/prometheus'
    
  - job_name: 'notify-worker'
    static_configs:
      - targets: ['worker:8081']
    metrics_path: '/api/actuator/prometheus'
