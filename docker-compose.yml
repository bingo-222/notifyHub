services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: notify-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: notify_hub
      MYSQL_USER: notify
      MYSQL_PASSWORD: notify123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/migration:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notify-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: notify-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notify-network

  # Gateway 服务
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: notify-gateway
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: notify_hub
      DB_USERNAME: root
      DB_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      JAVA_OPTS: >-
        -Xms512m
        -Xmx512m
        -XX:+UseG1GC
    ports:
      - "8080:8080"
    volumes:
      - ./logs/gateway:/logs
    networks:
      - notify-network
    restart: on-failure

  # Worker 服务
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: notify-worker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: notify_hub
      DB_USERNAME: root
      DB_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8081
      JAVA_OPTS: >-
        -Xms1g
        -Xmx1g
        -XX:+UseG1GC
    ports:
      - "8081:8081"
    volumes:
      - ./logs/worker:/logs
    networks:
      - notify-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Prometheus (可选)
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: notify-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - notify-network
    restart: on-failure

  # Grafana (可选)
  grafana:
    image: grafana/grafana:10.0.0
    container_name: notify-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - notify-network
    restart: on-failure

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  notify-network:
    driver: bridge