server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: notify-worker
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:notify_hub}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 10000ms
      shutdown-timeout: 100ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.company.notify.worker.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    root: INFO
    com.company.notify.worker: DEBUG
    okhttp3: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# 应用配置
app:
  notify:
    worker:
      # 是否使用供应商配置（设为 false 则使用任务自带的 URL 和 body）
      use-supplier-config: true
      # 批量获取任务数量
      batch-size: 100
      # 轮询间隔（毫秒）
      poll-interval-ms: 1000
      # HTTP 客户端配置
      http:
        connect-timeout-ms: 5000
        read-timeout-ms: 30000
        write-timeout-ms: 30000
      # 熔断配置
      circuit-breaker:
        enabled: true
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 5000
        permitted-number-of-calls-in-half-open-state: 10
        sliding-window-size: 100
        wait-duration-in-open-state: 30000
