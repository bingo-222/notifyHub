server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: notify-gateway
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:notify_hub}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 10000ms
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Redisson 配置
redisson:
  address: "redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
  database: 0
  connect-timeout: 10000
  timeout: 10000
  threads: 4
  netty-threads: 8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.company.notify.gateway.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    root: INFO
    com.company.notify.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# Actuator 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# 应用配置
app:
  notify:
    # 默认超时时间（毫秒）
    default-timeout-ms: 30000
    # 默认最大重试次数
    default-max-retry-count: 10
    # 限流配置（每秒请求数）
    rate-limit:
      enabled: true
      permits-per-second: 100
    # 消息队列配置
    queue:
      key: notify:queue
